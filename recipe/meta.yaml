{% set name = "climarraykit" %}
{% set version = "0.2.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  path: ..

build:
  noarch: python
  script: "{{ PYTHON }} -m pip install . --no-deps --ignore-installed -vv"

requirements:
  host:
    - python >=3.10
    - pip
    - setuptools >=68.0
    - wheel
  run:
    - python >=3.10
    - pip
    - numpy >=2.2.3
    - pandas >=2.2.3
    - xarray >=2024.2.0
    # filewise, pygenutils, paramlib: installed via post-link pip (see post-link.sh)

test:
  imports:
    - climarraykit
  commands:
    - python -c "import climarraykit; print(climarraykit.__version__)"

about:
  home: https://github.com/EusDancerDev/climarraykit
  license: MIT
  license_file: LICENSE
  summary: Climate-oriented xarray helpers for NetCDF, GRIB, coordinates, and dataset serialisation
  description: |
    climarraykit extends xarray with utilities tuned to climate grids: coordinate discovery, lazy-friendly
    NetCDF and GRIB handling, and serialisation patterns reused by climalab and related stacks. It keeps
    heavy optional backends configurable at install time.
  doc_url: https://github.com/EusDancerDev/climarraykit#readme
  dev_url: https://github.com/EusDancerDev/climarraykit.git

extra:
  recipe-maintainers:
    - EusDancerDev
